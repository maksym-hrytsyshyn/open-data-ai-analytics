name: open-data-ai-analytics

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: macro
      POSTGRES_USER: macro_user
      POSTGRES_PASSWORD: macro_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macro_user -d macro"]
      interval: 5s
      timeout: 5s
      retries: 10

  data_load:
    build:
      context: .
      dockerfile: docker/data_load/Dockerfile
    env_file: .env
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import psycopg2, os; conn = psycopg2.connect(host=os.environ['POSTGRES_HOST'], dbname=os.environ['POSTGRES_DB'], user=os.environ['POSTGRES_USER'], password=os.environ['POSTGRES_PASSWORD']); cur = conn.cursor(); cur.execute('SELECT COUNT(*) FROM macro'); print(cur.fetchone())\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  data_quality_analysis:
    build:
      context: .
      dockerfile: docker/data_quality_analysis/Dockerfile
    env_file: .env
    volumes:
      - shared_reports:/app/reports
    networks:
      - app_net
    depends_on:
      data_load:
        condition: service_healthy

  data_research:
    build:
      context: .
      dockerfile: docker/data_research/Dockerfile
    env_file: .env
    volumes:
      - shared_reports:/app/reports
    networks:
      - app_net
    depends_on:
      data_load:
        condition: service_healthy

  visualization:
    build:
      context: .
      dockerfile: docker/visualization/Dockerfile
    env_file: .env
    volumes:
      - shared_plots:/app/plots
    networks:
      - app_net
    depends_on:
      data_load:
        condition: service_healthy

  web:
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5000/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file: .env
    ports:
      - "5001:5000"
    volumes:
      - shared_plots:/app/plots
      - shared_reports:/app/reports
    networks:
      - app_net
    depends_on:
      - data_quality_analysis
      - data_research
      - visualization

volumes:
  pg_data:
  shared_plots:
  shared_reports:

networks:
  app_net:
    driver: bridge